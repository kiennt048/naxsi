user www-data;
worker_processes auto;
pid /run/nginx.pid;

# Load Naxsi WAF module
load_module /etc/nginx/modules/ngx_http_naxsi_module.so;

include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    # --- Basic Settings ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10m;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- SSL Settings ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Logging ---
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # --- Timeouts ---
    keepalive_timeout 65;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- Security Headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Naxsi Core Rules ---
    include /etc/nginx/naxsi_core.rules;

    # --- Naxsi Blocking Rules (from upstream 1.7) ---
    include /etc/nginx/naxsi_blocking_scanner.rules;
    include /etc/nginx/naxsi_blocking_web.rules;
    # include /etc/nginx/naxsi_blocking_wordpress.rules;  # Uncomment if running WordPress
    include /etc/nginx/naxsi_blocking_php.rules;
    include /etc/nginx/naxsi_blocking_sql.rules;

    # --- Additional configs ---
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    # --- Upstream backends (edit IPs for your environment) ---
    upstream backend {
        server 192.168.18.61:80;
        server 192.168.18.62:80;
    }

    server {
        listen 192.168.18.70:80;

        location / {
            include /etc/nginx/naxsi.rules;
            include /etc/nginx/naxsi_whitelist.rules;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /block.html {
            root /var/www/html;
            internal;
        }
    }
}
