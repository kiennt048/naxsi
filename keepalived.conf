global_defs {
    router_id naxsi_node
    script_user root
    enable_script_security
}

# Health check — verify Nginx is running
vrrp_script check_nginx {
    script "/etc/keepalived/check_nginx.sh"
    interval 2
    weight 50
    fall 3                              # Mark DOWN after 3 consecutive failures
    rise 2                              # Mark UP after 2 consecutive successes
}

vrrp_instance naxsi_ha {
    state MASTER                        # Set to BACKUP on the secondary node
    interface ens33                     # Network interface (edit for your environment)
    unicast_src_ip 192.168.18.72        # This server's real IP (edit per node)
    virtual_router_id 101
    priority 50                         # Higher = preferred master (e.g. 100 primary, 50 backup)
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass CHANGEME              # MUST be identical on both nodes — change this!
    }

    virtual_ipaddress {
        192.168.18.70                   # Virtual IP shared between nodes
    }

    track_script {
        check_nginx
    }
}
