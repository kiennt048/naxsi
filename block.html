<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Blocked</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            background: #fff;
            padding: 3rem 2.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 480px;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { color: #c0392b; font-size: 1.5rem; margin-bottom: 0.5rem; }
        p  { color: #666; line-height: 1.6; margin-top: 0.5rem; }
        .code { margin-top: 1.5rem; font-size: 0.85rem; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128737;</div>
        <h1>Request Blocked</h1>
        <p>Your request has been blocked by the Web Application Firewall.</p>
        <p>If you believe this is an error, please contact the site administrator.</p>
        <div class="code">Naxsi WAF</div>
    </div>
</body>
</html>
